services:
  - type: web
    name: makeyourtrip-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false          # Set this in the Render dashboard to your MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false          # Set a strong random string in the Render dashboard
      - key: NODE_ENV
        value: production
